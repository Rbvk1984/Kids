<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Guessing Game</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .game-box {
      background: white;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      max-width: 420px;
      width: 90%;
    }

    h1 {
      color: #764ba2;
      font-size: 2em;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #999;
      margin-bottom: 25px;
      font-size: 0.95em;
    }

    input[type="number"] {
      width: 100%;
      padding: 14px;
      font-size: 1.4em;
      border: 3px solid #ddd;
      border-radius: 12px;
      text-align: center;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: #764ba2;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      font-size: 1.2em;
      font-family: inherit;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    button:active {
      transform: scale(0.97);
    }

    #guess-btn {
      background: #764ba2;
      color: white;
    }

    #guess-btn:hover {
      opacity: 0.9;
    }

    #reset-btn {
      background: #f0f0f0;
      color: #555;
      display: none;
    }

    #reset-btn:hover {
      background: #e0e0e0;
    }

    #message {
      margin-top: 20px;
      font-size: 1.3em;
      min-height: 40px;
      font-weight: bold;
    }

    .too-low  { color: #e67e22; }
    .too-high { color: #e74c3c; }
    .correct  { color: #27ae60; }
    .hint     { color: #555; }

    #attempts {
      margin-top: 10px;
      color: #aaa;
      font-size: 0.9em;
    }

    #history {
      margin-top: 15px;
      font-size: 0.85em;
      color: #888;
      min-height: 20px;
    }

    .emoji {
      font-size: 2em;
      display: block;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>

<div class="game-box">
  <h1>🎯 Guess the Number!</h1>
  <p class="subtitle">I'm thinking of a number between <strong>1</strong> and <strong>100</strong></p>

  <input type="number" id="guess-input" min="1" max="100" placeholder="Your guess..." />

  <button id="guess-btn" onclick="makeGuess()">Guess!</button>
  <button id="reset-btn" onclick="resetGame()">Play Again 🔄</button>

  <div id="message"></div>
  <div id="attempts"></div>
  <div id="history"></div>
</div>

<script>
  let secretNumber;
  let attempts;
  let guesses;
  let gameOver;

  function startGame() {
    secretNumber = Math.floor(Math.random() * 100) + 1;
    attempts = 0;
    guesses = [];
    gameOver = false;

    document.getElementById('guess-input').value = '';
    document.getElementById('guess-input').disabled = false;
    document.getElementById('guess-btn').style.display = 'block';
    document.getElementById('reset-btn').style.display = 'none';
    document.getElementById('message').textContent = '';
    document.getElementById('message').className = '';
    document.getElementById('attempts').textContent = '';
    document.getElementById('history').textContent = '';
    document.getElementById('guess-input').focus();
  }

  function makeGuess() {
    if (gameOver) return;

    const input = document.getElementById('guess-input');
    const guess = parseInt(input.value);
    const messageEl = document.getElementById('message');
    const attemptsEl = document.getElementById('attempts');
    const historyEl = document.getElementById('history');

    if (isNaN(guess) || guess < 1 || guess > 100) {
      messageEl.textContent = '⚠️ Please enter a number between 1 and 100!';
      messageEl.className = 'hint';
      return;
    }

    attempts++;
    guesses.push(guess);

    if (guess < secretNumber) {
      messageEl.innerHTML = '<span class="emoji">⬆️</span>Too low! Go higher!';
      messageEl.className = 'too-low';
    } else if (guess > secretNumber) {
      messageEl.innerHTML = '<span class="emoji">⬇️</span>Too high! Go lower!';
      messageEl.className = 'too-high';
    } else {
      messageEl.innerHTML = `<span class="emoji">🎉</span>You got it! The number was <strong>${secretNumber}</strong>!`;
      messageEl.className = 'correct';
      gameOver = true;
      input.disabled = true;
      document.getElementById('guess-btn').style.display = 'none';
      document.getElementById('reset-btn').style.display = 'block';
    }

    attemptsEl.textContent = `Attempts: ${attempts}`;
    historyEl.textContent = `Your guesses: ${guesses.join(', ')}`;
    input.value = '';
    if (!gameOver) input.focus();
  }

  function resetGame() {
    startGame();
  }

  document.getElementById('guess-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') makeGuess();
  });

  startGame();
</script>

</body>
</html>
